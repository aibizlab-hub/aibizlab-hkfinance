name: Deploy HK Money Lab (CI/CD)

# Auto-deploys the HK-finance SEO microsite to GitHub Pages on every push to master.
# Pipeline: checkout -> install deps -> build markdown -> upload -> deploy.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-hkfinance
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: pip install markdown
      - name: Build site
        run: python build_blog.py
      - name: PII guard
        run: |
          if grep -rniE "ken851004|851004|1985-10-04|chan tak kin|KEN851004" site/; then
            echo "::error::PII detected in public site — aborting deploy"
            exit 1
          fi
          echo "PII guard passed"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
